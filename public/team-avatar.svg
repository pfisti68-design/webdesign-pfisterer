<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D2691E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="#f0f0f0"/>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bgGrad)"/>

  <!-- Shirt/Body -->
  <path d="M 60 180 Q 60 160 100 150 L 200 150 Q 240 160 240 180 L 240 400 L 60 400 Z" fill="url(#shirtGrad)" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Neck -->
  <ellipse cx="150" cy="150" rx="25" ry="20" fill="url(#skinGrad)"/>

  <!-- Head -->
  <circle cx="150" cy="100" r="55" fill="url(#skinGrad)" stroke="#d2691e" stroke-width="2"/>

  <!-- Hair -->
  <path d="M 95 60 Q 95 30 150 25 Q 205 30 205 60 Q 205 45 150 35 Q 95 45 95 60" fill="url(#hairGrad)"/>
  <ellipse cx="150" cy="65" rx="60" ry="50" fill="url(#hairGrad)"/>

  <!-- Face details -->
  <!-- Eyes -->
  <circle cx="130" cy="95" r="6" fill="#1a1a1a"/>
  <circle cx="170" cy="95" r="6" fill="#1a1a1a"/>
  <circle cx="132" cy="93" r="2" fill="white"/>
  <circle cx="172" cy="93" r="2" fill="white"/>

  <!-- Nose -->
  <path d="M 150 95 L 150 110" stroke="#d2691e" stroke-width="2" fill="none"/>

  <!-- Smile -->
  <path d="M 135 120 Q 150 130 165 120" stroke="#8B4513" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows -->
  <path d="M 120 80 Q 130 75 140 80" stroke="#3d3d3d" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 160 80 Q 170 75 180 80" stroke="#3d3d3d" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Beard/Stubble -->
  <circle cx="125" cy="125" r="1.5" fill="#8B4513" opacity="0.4"/>
  <circle cx="135" cy="128" r="1.5" fill="#8B4513" opacity="0.4"/>
  <circle cx="145" cy="130" r="1.5" fill="#8B4513" opacity="0.4"/>
  <circle cx="165" cy="130" r="1.5" fill="#8B4513" opacity="0.4"/>
  <circle cx="175" cy="128" r="1.5" fill="#8B4513" opacity="0.4"/>
  <circle cx="185" cy="125" r="1.5" fill="#8B4513" opacity="0.4"/>

  <!-- Shirt detail/collar -->
  <path d="M 120 160 L 150 170 L 180 160" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- Professional look - tie suggestion -->
  <rect x="145" y="170" width="10" height="40" fill="#B81D63" opacity="0.6"/>
  <polygon points="150,190 145,200 155,200" fill="#8B2D7A"/>
</svg>