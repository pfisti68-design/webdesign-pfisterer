<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f1f1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B81D63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C82D73;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#grad3)"/>

  <!-- Nested rectangles - modern corporate look -->
  <rect x="80" y="120" width="640" height="360" fill="none" stroke="#B81D63" stroke-width="3" rx="15"/>
  <rect x="120" y="160" width="560" height="280" fill="none" stroke="#8B2D7A" stroke-width="2" rx="10"/>
  <rect x="160" y="200" width="480" height="200" fill="url(#accentGrad3)" opacity="0.3" rx="8"/>

  <!-- Accent lines -->
  <line x1="80" y1="180" x2="720" y2="180" stroke="#B81D63" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="380" x2="720" y2="380" stroke="#8B2D7A" stroke-width="2" opacity="0.5"/>

  <!-- Side accent -->
  <rect x="700" y="120" width="20" height="360" fill="url(#accentGrad3)" rx="10"/>

  <!-- Text -->
  <text x="400" y="520" font-size="48" font-weight="bold" text-anchor="middle" fill="#B81D63" opacity="0.3" font-family="Arial, sans-serif">
    CORPORATE
  </text>
</svg>