<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B81D63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B2D7A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#grad1)"/>

  <!-- Abstract geometric shapes -->
  <circle cx="150" cy="100" r="80" fill="url(#accentGrad)" opacity="0.8"/>
  <rect x="500" y="350" width="200" height="200" fill="#B81D63" opacity="0.6" transform="rotate(45 600 450)"/>
  <polygon points="400,50 500,150 300,150" fill="#8B2D7A" opacity="0.7"/>

  <!-- Grid pattern -->
  <g stroke="rgba(184,29,99,0.2)" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>

  <!-- Modern text overlay -->
  <text x="400" y="300" font-size="48" font-weight="bold" text-anchor="middle" fill="#B81D63" opacity="0.3" font-family="Arial, sans-serif">
    E-COMMERCE
  </text>
</svg>