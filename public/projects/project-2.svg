<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B2D7A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B81D63;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#grad2)"/>

  <!-- Modern dashboard elements -->
  <rect x="50" y="80" width="700" height="450" fill="none" stroke="#B81D63" stroke-width="2" rx="10"/>

  <!-- Dashboard bars -->
  <rect x="100" y="150" width="150" height="250" fill="url(#accentGrad2)" opacity="0.6" rx="5"/>
  <rect x="300" y="200" width="150" height="200" fill="#B81D63" opacity="0.5" rx="5"/>
  <rect x="500" y="120" width="150" height="280" fill="#8B2D7A" opacity="0.6" rx="5"/>

  <!-- Grid dots -->
  <circle cx="250" cy="150" r="4" fill="#B81D63" opacity="0.4"/>
  <circle cx="250" cy="200" r="4" fill="#B81D63" opacity="0.4"/>
  <circle cx="250" cy="250" r="4" fill="#B81D63" opacity="0.4"/>
  <circle cx="250" cy="300" r="4" fill="#B81D63" opacity="0.4"/>
  <circle cx="550" cy="150" r="4" fill="#8B2D7A" opacity="0.4"/>
  <circle cx="550" cy="250" r="4" fill="#8B2D7A" opacity="0.4"/>

  <!-- Text -->
  <text x="400" y="550" font-size="48" font-weight="bold" text-anchor="middle" fill="#B81D63" opacity="0.3" font-family="Arial, sans-serif">
    SAAS
  </text>
</svg>