<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B81D63;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8B2D7A;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Logo 1: HANDWERKSBETRIEB -->
  <g transform="translate(50, 50)">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#B81D63" stroke-width="2"/>
    <polygon points="30,10 40,25 20,25" fill="#B81D63"/>
    <rect x="20" y="35" width="20" height="15" fill="#B81D63"/>
    <text x="65" y="35" font-family="Arial" font-size="14" font-weight="bold" fill="#333">HANDWERK</text>
  </g>

  <!-- Logo 2: RESTAURANT ONLINE -->
  <g transform="translate(250, 50)">
    <rect x="10" y="10" width="40" height="40" rx="5" fill="none" stroke="#8B2D7A" stroke-width="2"/>
    <circle cx="20" cy="20" r="3" fill="#8B2D7A"/>
    <circle cx="35" cy="20" r="3" fill="#8B2D7A"/>
    <circle cx="20" cy="35" r="3" fill="#8B2D7A"/>
    <circle cx="35" cy="35" r="3" fill="#8B2D7A"/>
    <text x="65" y="35" font-family="Arial" font-size="14" font-weight="bold" fill="#333">RESTAURANT</text>
  </g>

  <!-- Logo 3: DIENSTLEISTER -->
  <g transform="translate(450, 50)">
    <path d="M 15 30 Q 30 10 45 30" fill="none" stroke="#B81D63" stroke-width="2"/>
    <circle cx="15" cy="35" r="4" fill="#B81D63"/>
    <circle cx="45" cy="35" r="4" fill="#B81D63"/>
    <line x1="15" y1="35" x2="45" y2="35" stroke="#B81D63" stroke-width="2"/>
    <text x="65" y="35" font-family="Arial" font-size="14" font-weight="bold" fill="#333">SERVICE</text>
  </g>

  <!-- Logo 4: ZAHNARZT -->
  <g transform="translate(650, 50)">
    <rect x="15" y="15" width="30" height="35" rx="3" fill="none" stroke="#8B2D7A" stroke-width="2"/>
    <circle cx="22" cy="25" r="2.5" fill="#8B2D7A"/>
    <circle cx="30" cy="25" r="2.5" fill="#8B2D7A"/>
    <circle cx="38" cy="25" r="2.5" fill="#8B2D7A"/>
    <circle cx="22" cy="35" r="2.5" fill="#8B2D7A"/>
    <circle cx="30" cy="35" r="2.5" fill="#8B2D7A"/>
    <circle cx="38" cy="35" r="2.5" fill="#8B2D7A"/>
    <text x="65" y="35" font-family="Arial" font-size="14" font-weight="bold" fill="#333">ZAHNARZT</text>
  </g>

  <!-- Logo 5: E-COMMERCE -->
  <g transform="translate(850, 50)">
    <path d="M 10 20 L 25 10 L 40 20 L 35 35 L 15 35 Z" fill="none" stroke="#B81D63" stroke-width="2"/>
    <line x1="25" y1="10" x2="25" y2="35" stroke="#B81D63" stroke-width="1.5" opacity="0.5"/>
    <text x="65" y="35" font-family="Arial" font-size="14" font-weight="bold" fill="#333">E-COMMERCE</text>
  </g>

  <!-- Logo 6: VEREIN -->
  <g transform="translate(1050, 50)">
    <circle cx="30" cy="25" r="20" fill="none" stroke="#8B2D7A" stroke-width="2"/>
    <polygon points="30,8 35,20 48,20 38,28 42,40 30,32 18,40 22,28 12,20 25,20" fill="#8B2D7A"/>
    <text x="65" y="35" font-family="Arial" font-size="14" font-weight="bold" fill="#333">VEREIN</text>
  </g>
</svg>