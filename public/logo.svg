<svg viewBox="0 0 200 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B81D63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B2D7A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Geometric "W" */
  <g>
    <!-- Left triangle */
    <polygon points="8,28 14,8 16,28" fill="url(#logoGradient)" />

    <!-- Middle valley */
    <polygon points="16,28 20,18 24,28" fill="url(#logoGradient)" opacity="0.8" />

    <!-- Right triangle */
    <polygon points="24,28 28,8 34,28" fill="url(#logoGradient)" />

    <!-- Bottom line */
    <rect x="8" y="30" width="26" height="2" fill="url(#logoGradient)" />
  </g>

  <!-- Text: "PFISTERER" */
  <text x="42" y="28" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#1a1a1a" letter-spacing="0.5">
    PFISTERER
  </text>

  <!-- Subtitle: "webdesign" */
  <text x="42" y="45" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#B81D63" letter-spacing="0.3">
    WEBDESIGN
  </text>
</svg>